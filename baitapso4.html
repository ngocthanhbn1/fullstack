<div class="panel">

  <h2>Trung tâm cấu hình giao diện (Demo)</h2>

  <!-- THEME -->
  <div class="group">
    <p>Chọn giao diện:</p>

    <input type="radio" id="light" name="theme" checked>
    <label for="light">Light</label>

    <input type="radio" id="dark" name="theme">
    <label for="dark">Dark</label>
  </div>

  <!-- COLOR -->
  <div class="group">
    <p>Chọn màu:</p>

    <input type="radio" id="red" name="color" checked>
    <label for="red">Red</label>

    <input type="radio" id="blue" name="color">
    <label for="blue">Blue</label>

    <input type="radio" id="green" name="color">
    <label for="green">Green</label>
  </div>

  <!-- LANGUAGE -->
  <div class="group">
    <p>Ngôn ngữ:</p>

    <input type="radio" id="vi" name="lang" checked>
    <label for="vi">VI</label>

    <input type="radio" id="en" name="lang">
    <label for="en">EN</label>
  </div>

  <!-- OPTIONS -->
  <div class="group">
    <p>Tùy chọn:</p>

    <input type="checkbox" id="adv">
    <label for="adv">Advanced</label>

    <input type="checkbox" id="eco">
    <label for="eco">Eco</label>

    <input type="checkbox" id="warn">
    <label for="warn">Warning</label>
  </div>

  <!-- RESULT -->
  <div class="result">

    <p class="theme-light">Theme Light: Giao diện sáng</p>
    <p class="theme-dark">Theme Dark: Giao diện tối</p>

    <p class="color-red">Màu Red đang chọn</p>
    <p class="color-blue">Màu Blue đang chọn</p>
    <p class="color-green">Màu Green đang chọn</p>

    <p class="lang-vi">[VI] Xin chào</p>
    <p class="lang-en">[EN] Hello</p>

    <p class="opt-adv">Advanced bật</p>
    <p class="opt-eco">Eco bật</p>
    <p class="opt-warn">Warning bật</p>

  </div>

</div>
